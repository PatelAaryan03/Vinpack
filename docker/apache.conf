# Vinpack Production Apache Configuration
# Place in /etc/apache2/sites-available/vinpack.conf

<VirtualHost *:80>
    ServerName yourdomain.com
    ServerAlias www.yourdomain.com
    
    # Redirect HTTP to HTTPS
    Redirect permanent / https://yourdomain.com/
</VirtualHost>

<VirtualHost *:443>
    ServerName yourdomain.com
    ServerAlias www.yourdomain.com
    
    # Document Root
    DocumentRoot /var/www/html/public
    
    # PHP Configuration
    <FilesMatch \.php$>
        SetHandler "proxy:unix:/run/php/php8.2-fpm.sock|fcgi://localhost"
    </FilesMatch>
    
    # SSL Configuration
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/yourdomain.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/yourdomain.com/privkey.pem
    SSLCertificateChainFile /etc/letsencrypt/live/yourdomain.com/chain.pem
    
    # Security Headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"
    
    # Compression
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/css application/javascript application/json
        AddOutputFilterByType DEFLATE text/xml application/xml application/xml+rss
    </IfModule>
    
    # Caching
    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresByType text/css "access plus 30 days"
        ExpiresByType application/javascript "access plus 30 days"
        ExpiresByType image/jpeg "access plus 1 year"
        ExpiresByType image/png "access plus 1 year"
        ExpiresByType image/gif "access plus 1 year"
        ExpiresByType image/svg+xml "access plus 1 year"
    </IfModule>
    
    # Logging
    ErrorLog ${APACHE_LOG_DIR}/vinpack_error.log
    CustomLog ${APACHE_LOG_DIR}/vinpack_access.log combined
    
    # Directory Restrictions
    <Directory /var/www/html/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        
        # Enable mod_rewrite
        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            
            # Prevent access to .env file
            RewriteRule ^\.env$ - [F,L]
            RewriteRule ^config/.*$ - [F,L]
            RewriteRule ^database/.*$ - [F,L]
            RewriteRule ^logs/.*$ - [F,L]
            RewriteRule ^\.git/.*$ - [F,L]
            
            # Existing file/directory, do nothing
            RewriteCond %{REQUEST_FILENAME} -f [OR]
            RewriteCond %{REQUEST_FILENAME} -d
            RewriteRule ^ - [L]
            
            # API routing
            RewriteRule ^api/(.*)$ api/$1 [L]
            
            # Admin routing
            RewriteRule ^admin/(.*)$ admin/$1 [L]
        </IfModule>
    </Directory>
    
    # Security: Deny access to sensitive files
    <FilesMatch "(^#|\.lock$|\.json$|\.env|\.htaccess)">
        Require all denied
    </FilesMatch>
    
    # PHP Configuration
    <FilesMatch \.php$>
        Require all granted
    </FilesMatch>
    
    # Disable directory listing
    Options -Indexes
</VirtualHost>
